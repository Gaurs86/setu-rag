# Runtime knobs (mirror setu_rag/config.py). Tuned for a single Colab T4 (16 GB).
device: cuda
load_in_4bit: true
retrieve_k: 30        # candidates per view before fusion
rerank_k: 8           # kept after cross-encoder
max_ctx_docs: 5       # docs given to the generator
rrf_k: 60
cmi_low: 0.05         # below -> treat as monolingual
cmi_high: 0.20        # above -> full crosslingual fan-out
faithfulness_threshold: 0.7

models:
  lid:            ai4bharat/IndicLID
  translit:       ai4bharat/indicxlit
  embedder:       BAAI/bge-m3
  reranker:       BAAI/bge-reranker-v2-m3
  mt_en_indic:    ai4bharat/indictrans2-en-indic-dist-200M
  mt_indic_en:    ai4bharat/indictrans2-indic-en-dist-200M
  gen_primary:    sarvamai/sarvam-1
  gen_fallback:   CohereForAI/aya-expanse-8b
  nli:            MoritzLaurer/mDeBERTa-v3-base-xnli-multilingual-nli-2mil7
