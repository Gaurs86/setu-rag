<svg viewBox="0 0 920 1230" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
<title>SETU-RAG code-switch-aware multilingual RAG architecture</title>
<desc>Vertical pipeline from a code-switched user query through CS front-end, CMI-adaptive router, transliteration-robust multi-view query, hybrid crosslingual retrieval, reranking, corrective grader, CMI-conditioned generation and faithfulness gate. Purple = novel; grey = standard.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7c7b74"/></marker>
<marker id="arrowp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7F77DD"/></marker>
</defs>
<rect x="0" y="0" width="920" height="1230" fill="#ffffff"/>
<text x="34" y="34" font-size="21" font-weight="700" fill="#1a1a1a">SETU-RAG</text>
<text x="34" y="55" font-size="13.5" fill="#555555">Code-Switch-Aware Multilingual RAG for 22 Indian languages · customer support · Colab T4</text>
<rect x="650" y="20" width="240" height="56" rx="8" fill="#ffffff" stroke="#D3D1C7" stroke-width="1"/>
<rect x="664" y="33" width="16" height="13" rx="3" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.5"/>
<text x="688" y="44" font-size="11.5" fill="#1a1a1a">★ Novel / CS-aware contribution</text>
<rect x="664" y="54" width="16" height="13" rx="3" fill="#F1EFE8" stroke="#888780" stroke-width="1.5"/>
<text x="688" y="65" font-size="11.5" fill="#1a1a1a">Standard RAG component</text>
<rect x="270" y="84" width="380" height="50" rx="25" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.6"/>
<text x="460" y="104" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">User query (code-switched)</text>
<text x="460" y="122" font-size="11.5" font-style="italic" text-anchor="middle" fill="#555555">"mera refund kab tak aayega, order cancel kar diya tha"</text>
<rect x="270" y="162" width="380" height="84" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
<text x="286" y="186" font-size="14.5" font-weight="700" fill="#1a1a1a">1 · CS Linguistic Front-End</text>
<text x="286" y="206" font-size="11.5" fill="#555555">Token-level LID · script detect · transliteration normalize</text>
<text x="286" y="223" font-size="11.5" fill="#555555">Matrix-language ID · Code-Mixing Index (CMI)</text>
<text x="286" y="240" font-size="10.5" font-weight="600" fill="#534AB7">IndicLID · IndicXlit</text>
<rect x="270" y="274" width="380" height="84" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
<rect x="556" y="282" width="86" height="18" rx="9" fill="#7F77DD"/>
<text x="599" y="295" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">★ NOVEL</text>
<text x="286" y="298" font-size="14.5" font-weight="700" fill="#1a1a1a">2 · CMI-Adaptive Retrieval Router</text>
<text x="286" y="318" font-size="11.5" fill="#555555">Routes strategy by CMI + matrix language:</text>
<text x="286" y="335" font-size="11.5" fill="#555555">no-retrieval · monolingual · crosslingual fan-out</text>
<text x="286" y="352" font-size="10.5" font-weight="600" fill="#534AB7">policy head over front-end features</text>
<rect x="270" y="386" width="380" height="84" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
<rect x="556" y="394" width="86" height="18" rx="9" fill="#7F77DD"/>
<text x="599" y="407" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">★ NOVEL</text>
<text x="286" y="410" font-size="14.5" font-weight="700" fill="#1a1a1a">3 · Transliteration-Robust Multi-View Query</text>
<text x="286" y="430" font-size="11.5" fill="#555555">4 views: surface · native-script · matrix-canonical ·</text>
<text x="286" y="447" font-size="11.5" fill="#555555">per-language sub-queries → embed each</text>
<text x="286" y="464" font-size="10.5" font-weight="600" fill="#534AB7">IndicTrans2 · BGE-M3 (dense+sparse)</text>
<rect x="270" y="498" width="380" height="84" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.6"/>
<text x="286" y="522" font-size="14.5" font-weight="700" fill="#1a1a1a">4 · Hybrid Crosslingual Retrieval</text>
<text x="286" y="542" font-size="11.5" fill="#555555">Dense (FAISS) + sparse + BM25 over all views</text>
<text x="286" y="559" font-size="11.5" fill="#555555">Reciprocal Rank Fusion (RRF)</text>
<text x="286" y="576" font-size="10.5" font-weight="600" fill="#5F5E5A">BGE-M3 · FAISS · BM25</text>
<rect x="270" y="610" width="380" height="70" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.6"/>
<text x="286" y="634" font-size="14.5" font-weight="700" fill="#1a1a1a">5 · Crosslingual Reranking</text>
<text x="286" y="654" font-size="11.5" fill="#555555">Cross-encoder second-pass precision</text>
<text x="286" y="671" font-size="10.5" font-weight="600" fill="#5F5E5A">BGE-reranker-v2-m3</text>
<rect x="270" y="708" width="380" height="76" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.6"/>
<text x="286" y="732" font-size="14.5" font-weight="700" fill="#1a1a1a">6 · Corrective Grader (CRAG)</text>
<text x="286" y="752" font-size="11.5" fill="#555555">Grade docs: relevant / ambiguous / irrelevant</text>
<text x="286" y="769" font-size="11.5" fill="#555555">weak → re-query / KB fallback</text>
<rect x="270" y="812" width="380" height="84" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1.8"/>
<rect x="556" y="820" width="86" height="18" rx="9" fill="#7F77DD"/>
<text x="599" y="833" font-size="10" font-weight="700" text-anchor="middle" fill="#fff">★ NOVEL</text>
<text x="286" y="836" font-size="14.5" font-weight="700" fill="#1a1a1a">7 · CMI-Conditioned Generation</text>
<text x="286" y="856" font-size="11.5" fill="#555555">Answer mirrors user's matrix lang + mix ratio</text>
<text x="286" y="873" font-size="11.5" fill="#555555">grounded in reranked context</text>
<text x="286" y="890" font-size="10.5" font-weight="600" fill="#534AB7">Sarvam-1 (2B) · Aya-Expanse-8B fallback</text>
<rect x="270" y="924" width="380" height="70" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.6"/>
<text x="286" y="948" font-size="14.5" font-weight="700" fill="#1a1a1a">8 · Faithfulness Gate (Self-RAG)</text>
<text x="286" y="968" font-size="11.5" fill="#555555">Verify grounding; regenerate or abstain</text>
<text x="286" y="985" font-size="10.5" font-weight="600" fill="#5F5E5A">NLI check · reflection</text>
<rect x="270" y="1022" width="380" height="50" rx="25" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.6"/>
<text x="460" y="1042" font-size="14" font-weight="700" text-anchor="middle" fill="#1a1a1a">Style-matched grounded answer</text>
<text x="460" y="1060" font-size="11.5" font-style="italic" text-anchor="middle" fill="#555555">"aapka refund 5-7 din mein aa jayega, cancel ho chuka hai"</text>
<line x1="460" y1="134" x2="460" y2="160" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="246" x2="460" y2="272" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="358" x2="460" y2="384" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="470" x2="460" y2="496" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="582" x2="460" y2="608" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="680" x2="460" y2="706" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="784" x2="460" y2="810" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="896" x2="460" y2="922" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="460" y1="994" x2="460" y2="1020" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<path d="M270,746 C190,746 190,428 268,428" fill="none" stroke="#7F77DD" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrowp)"/>
<text x="150" y="590" font-size="10.5" font-weight="600" fill="#534AB7" transform="rotate(-90 150 590)">corrective re-query</text>
<rect x="690" y="470" width="206" height="180" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.6" stroke-dasharray="2 2"/>
<text x="704" y="494" font-size="13" font-weight="700" fill="#1a1a1a">Offline KB Indexing</text>
<text x="704" y="513" font-size="11" fill="#555555">FAQ / support corpus</text>
<text x="704" y="532" font-size="11" fill="#555555">Switch-point-aware chunking</text>
<text x="704" y="551" font-size="11" fill="#555555">Index 3 forms per doc:</text>
<text x="712" y="569" font-size="11" fill="#555555">native · romanized · EN-pivot</text>
<text x="704" y="592" font-size="11" fill="#555555">Dense + sparse vectors</text>
<text x="704" y="615" font-size="10.5" font-weight="600" fill="#5F5E5A">BGE-M3 · IndicXlit ·</text>
<text x="704" y="631" font-size="10.5" font-weight="600" fill="#5F5E5A">IndicTrans2 · FAISS</text>
<path d="M690,545 C672,545 672,540 652,540" fill="none" stroke="#7c7b74" stroke-width="1.8" marker-end="url(#arrow)"/>
<rect x="60" y="1108" width="800" height="92" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1.6"/>
<text x="76" y="1132" font-size="14" font-weight="700" fill="#1a1a1a">Evaluation Harness — "CS-RAGAS"</text>
<text x="76" y="1153" font-size="11.5" fill="#555555">RAG quality: faithfulness · answer relevancy · context precision/recall · nDCG@k · MRR</text>
<text x="76" y="1171" font-size="11.5" fill="#555555">CS-native: CMI-alignment (query-answer) · language consistency · transliteration-robustness delta · latency on T4</text>
<text x="76" y="1189" font-size="10.5" font-weight="600" fill="#5F5E5A">RAGAS · GLUECoS / LinCE · custom CS support-FAQ set</text>
</svg>
